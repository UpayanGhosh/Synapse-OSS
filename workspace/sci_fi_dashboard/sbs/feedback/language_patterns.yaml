# Default patterns — English only. Add your own language entries below.
# Each category accepts a list of regex patterns (case-insensitive).
tone_more_casual:
  - "why (are you|so) formal"
  - "stop being (formal|robotic)"
  - "sound[s]? like a robot"
  # add your language patterns here, e.g.:
  # - "beshi formal hoyona"

tone_more_professional:
  - "too casual"
  - "\\b(be|stay|keep it) serious\\b"
  - "\\b(be|stay|sound|act)\\s+(more\\s+)?professional\\b"
  - "\\bkeep it professional\\b"
  - "\\buse a professional tone\\b"
  - "\\bformal tone\\b"
  - "\\bno jokes\\b"
  - "\\bstop joking\\b"
  - "\\bstop being (quirky|witty|playful|casual)\\b"

length_shorter:
  - "too long"
  - "keep it short"
  - "tl;dr"
  - "stop yapping"
  - "too much text"

length_more_detailed:
  - "elaborate"
  - "explain more"
  - "too short"

praise:
  - "good (boy|job)"
  - "perfect"
  - "exactly"
  - "love this tone"

rejection:
  - "no that'?s wrong"
  - "not what i meant"
  - "shut up"
