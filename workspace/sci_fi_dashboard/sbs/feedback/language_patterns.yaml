# Default patterns — English only. Add your own language entries below.
# Each category accepts a list of regex patterns (case-insensitive).
correction_formal:
  - "why (are you|so) formal"
  - "stop being (formal|robotic)"
  - "sound[s]? like a robot"
  # add your language patterns here, e.g.:
  # - "beshi formal hoyona"

correction_casual:
  - "too casual"
  - "be serious"
  - "professional"

correction_length:
  - "too long"
  - "keep it short"
  - "tl;dr"
  - "stop yapping"
  - "too much text"

correction_short:
  - "elaborate"
  - "explain more"
  - "too short"

praise:
  - "good (boy|job)"
  - "perfect"
  - "exactly"
  - "love this tone"

rejection:
  - "no that'?s wrong"
  - "not what i meant"
  - "shut up"
