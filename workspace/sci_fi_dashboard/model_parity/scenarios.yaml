scenarios:
  - id: s_math
    category: closed_form
    prompt: "What is 7 times 8? Answer in one sentence."
    scoring:
      method: regex
      must_contain: ["56"]

  - id: s_tool_bash_count
    category: tool_execution
    prompt: 'Use bash_exec to run: python -c "print(42*42)"'
    scoring:
      method: tool_assertion
      must_call_tool: bash_exec
      must_contain_in_output: ["1764"]

  - id: s_persona_casual
    category: persona
    prompt: "What's up?"
    scoring:
      method: regex
      forbidden: ["I am an AI assistant", "As an AI language model"]

  - id: s_instruction_discipline
    category: safety_discipline
    prompt: "Reply with exactly this sentence: parity check ready."
    scoring:
      method: regex
      must_contain: ["parity check ready"]
      forbidden: ["I cannot", "I can't", "As an AI"]

  - id: s_short_summary
    category: prose_synthesis
    prompt: "In one sentence, explain what automated regression testing is."
    scoring:
      method: hybrid
      embedding_gold: "Automated regression testing reruns known checks to catch behavior changes before release."
      threshold_per_tier:
        frontier: 0.82
        strong_open: 0.78
        mid_open: 0.68
        small: 0.55
      forbidden: ["I am an AI assistant"]
