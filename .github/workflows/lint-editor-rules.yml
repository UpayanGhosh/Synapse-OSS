name: Editor rule files parity

on:
  pull_request:
    paths:
      - '.cursorrules'
      - '.windsurfrules'
  push:
    branches: [main, develop]
    paths:
      - '.cursorrules'
      - '.windsurfrules'

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify .cursorrules and .windsurfrules are identical
        run: |
          if ! cmp -s .cursorrules .windsurfrules; then
            echo "::error::.cursorrules and .windsurfrules have diverged."
            echo "If you intentionally edited one, also update the other."
            echo "Diff:"
            diff .cursorrules .windsurfrules || true
            exit 1
          fi
          echo "OK: editor rule files are byte-identical."
